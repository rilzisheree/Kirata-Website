openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Personal bio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: presence
    description: Real-time presence operations
  - name: spotify
    description: Spotify recently played tracks
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /presence:
    get:
      operationId: getPresence
      tags: [presence]
      summary: Get current presence
      description: Returns the current real-time presence status (online/idle/offline, current app, game, song, etc.)
      responses:
        "200":
          description: Current presence data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Presence"

    put:
      operationId: updatePresence
      tags: [presence]
      summary: Update presence
      description: Updates the presence state. Intended to be called by a desktop application.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceInput"
      responses:
        "200":
          description: Updated presence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Presence"

  /spotify/recent:
    get:
      operationId: getSpotifyRecent
      tags: [spotify]
      summary: Get recently played Spotify tracks
      responses:
        "200":
          description: Recently played tracks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyRecentTracks"

components:
  schemas:
    SpotifyRecentTracks:
      type: object
      required: [tracks]
      properties:
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/SpotifyTrack"

    SpotifyTrack:
      type: object
      required: [name, artist, playedAt]
      properties:
        name:
          type: string
        artist:
          type: string
        albumArt:
          type: ["string", "null"]
        spotifyUrl:
          type: ["string", "null"]
        playedAt:
          type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Presence:
      type: object
      required:
        - status
        - lastUpdated
      properties:
        status:
          type: string
          enum: [online, idle, offline]
          description: "online | idle | offline"
        currentApp:
          type: ["string", "null"]
          description: Currently open application (legacy, prefer currentApps)
        currentApps:
          type: array
          items:
            type: string
          description: All currently open/visible apps
        currentGame:
          type: ["string", "null"]
          description: Currently playing game
        currentSong:
          type: ["string", "null"]
          description: Currently listening to song
        currentSongArtist:
          type: ["string", "null"]
          description: Artist of current song
        currentSongAlbumArt:
          type: ["string", "null"]
          description: URL to album art
        timeSpent:
          type: ["string", "null"]
          description: Human-readable time spent in current activity (e.g. "2h 15m") — legacy, prefer activityStartTime
        activityIcon:
          type: ["string", "null"]
          description: Icon URL or emoji for current activity
        uptime:
          type: ["string", "null"]
          description: Human-readable PC uptime (e.g. "3h 24m") — legacy, prefer bootTime
        bootTime:
          type: ["string", "null"]
          description: ISO 8601 timestamp of when the PC last booted
        activityStartTime:
          type: ["string", "null"]
          description: ISO 8601 timestamp of when the current activity started
        lastUpdated:
          type: string
          description: ISO 8601 timestamp of last update

    PresenceInput:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [online, idle, offline]
        currentApp:
          type: ["string", "null"]
        currentApps:
          type: array
          items:
            type: string
        currentGame:
          type: ["string", "null"]
        currentSong:
          type: ["string", "null"]
        currentSongArtist:
          type: ["string", "null"]
        currentSongAlbumArt:
          type: ["string", "null"]
        timeSpent:
          type: ["string", "null"]
        activityIcon:
          type: ["string", "null"]
        uptime:
          type: ["string", "null"]
        bootTime:
          type: ["string", "null"]
          description: ISO 8601 timestamp of when the PC last booted
        activityStartTime:
          type: ["string", "null"]
          description: ISO 8601 timestamp of when the current activity started
